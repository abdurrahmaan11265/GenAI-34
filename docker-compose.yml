version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: Lexis_postgres
    environment:
      POSTGRES_USER: Lexis_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: Lexis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5.12.0
    container_name: Lexis_neo4j
    environment:
      NEO4J_AUTH: neo4j/your_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
